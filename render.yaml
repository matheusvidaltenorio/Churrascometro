# Render Blueprint - Churrascômetro
# Static Site puro: sem banco, sem backend. Cálculo no navegador.
# Compartilhar = link com dados codificados na URL (nada fica salvo)

services:
  - type: web
    name: churrascometro
    runtime: static
    region: oregon

    rootDir: frontend

    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
