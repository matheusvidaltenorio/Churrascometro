# Render Blueprint - Churrascômetro
# Deploy unificado: API + Frontend em um único serviço (sem CORS, sem VITE_API_URL)
# Banco: Supabase ou Render Postgres (configure DATABASE_URL)

services:
  - type: web
    name: churrascometro
    runtime: node
    region: oregon

    rootDir: .

    buildCommand: npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
