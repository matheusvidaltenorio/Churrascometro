# Render Blueprint - Churrascômetro
# Conecte o repositório no Render e use "Apply" para criar os serviços
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: churrascometro-db
    databaseName: churrascometro
    user: churrascometro
    plan: free

services:
  # Backend API
  - type: web
    name: churrascometro-api
    runtime: node
    region: oregon

    rootDir: backend

    buildCommand: npm install && npm run build
    startCommand: npm run db:migrate && npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: churrascometro-db
          property: connectionString
      # Adicione manualmente no Dashboard após o deploy (URL do frontend)
      - key: FRONTEND_URL
        sync: false

  # Frontend (Static Site)
  - type: web
    name: churrascometro-web
    runtime: static
    region: oregon

    rootDir: frontend

    buildCommand: npm install && npm run build
    staticPublishPath: dist

    # SPA: redireciona todas as rotas para index.html (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # URL da API - adicione após o deploy do backend (ex: https://churrascometro-api.onrender.com)
      - key: VITE_API_URL
        sync: false
