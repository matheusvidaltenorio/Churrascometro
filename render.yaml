# Render Blueprint - Churrascômetro
# Banco: Supabase (configure DATABASE_URL manualmente)
# Docs: https://render.com/docs/blueprint-spec

services:
  # Backend API
  - type: web
    name: churrascometro-api
    runtime: node
    region: oregon

    rootDir: backend

    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run db:migrate && npm start

    envVars:
      - key: NODE_ENV
        value: production
      # Connection string do Supabase - Project Settings > Database
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend (Static Site)
  - type: web
    name: churrascometro-web
    runtime: static
    region: oregon

    rootDir: frontend

    buildCommand: npm install && npm run build
    staticPublishPath: dist

    # SPA: redireciona todas as rotas para index.html (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # URL da API - adicione após o deploy do backend (ex: https://churrascometro-api.onrender.com)
      - key: VITE_API_URL
        sync: false
